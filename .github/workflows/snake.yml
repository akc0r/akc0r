name: Generate Snake

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: akc0r
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=#7C3AED&color_dots=#ebedf0,#e9d5ff,#c084fc,#a855f7,#7c3aed
            
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
